        <!-- Swiper JS -->
        <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

        <!-- Initialize Swiper -->
        <script>
            document.addEventListener("DOMContentLoaded", ev => {
                setTimeout(() => {
                    var swiper = new Swiper(".certificates", {
                        autoHeight: true,
                        centeredSlides: true,
                        spaceBetween: 20,
                        rewind: true,
                        effect: "fade",
                        coverflowEffect: {
                            rotate: 50,
                            stretch: 0,
                            depth: 100,
                            modifier: 1,
                            slideShadows: true,
                        },
                        pagination: {
                            el: ".swiper-pagination",
                            clickable: true,
                            dynamicBullets: true
                        },
                        autoplay: {
                            delay: 2500,
                            disableOnInteraction: true,
                        }
                    });
                }, 1000 * 1);

                setTimeout(() => {
                    var projectsSwiper = new Swiper(".projects", {
                        effect: "flip",
                        grabCursor: true,
                        rewind: true,
                        autoplay: {
                            delay: 2500,
                            disableOnInteraction: true,
                        }
                    });
                }, 1000 * 1.1);
            })
        </script>
