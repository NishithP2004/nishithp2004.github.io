                document.getElementById("arrow").addEventListener("click", () => {

                        `

            header {
                display: block; 
            }

                border-right: none;
                border-bottom: 1px solid white;
            }
        }
        `

                    let inactiveStyle = `
        @media all and (min-width: 320px) and (max-width: 426px) {
            .nav-links {
                display: none;
                flex-direction: row;
            }

            header {
                display: flex;
            }

            title {
                border-bottom: none;
                border-right: 1px solid white;
            }

            #arrow {
                padding-left: 0px;
            }
        }

            `
                    let element = document.getElementById("arrow").classList;
                    var stylesheet = document.getElementById('js-inject');

                    if (element.contains("fa-caret-down")) {
                        stylesheet.innerText = activeStyle;
                        element.replace("fa-caret-down", "fa-caret-up")
                    } else if (element.contains("fa-caret-up")) {
                        stylesheet.innerText = inactiveStyle;
                        element.replace("fa-caret-up", "fa-caret-down")
                    }

                    document.head.appendChild(stylesheet);

                })

        <div id="roadmap">
            <!-- The Timeline -->
            <h2 class="subheadings">Roadmap</h2>

            <ul class="timeline" id="timeline">
            </ul>

        </div>
        <script>
            let template =
                `
                <li>
                    <div class="{{Direction}}">
                        <div class="flag-wrapper">
                            <span class="flag">{{Flag}}</span>
                            <span class="time-wrapper"><span class="time">{{Time}}</span></span>
                        </div>
                        <div class="desc">{{Description}}</div>
                    </div>
                </li>
            `
            let code = `
            <div class="mySlides">
                    <img src="{{image_url}}" style="width:100%">
                </div>
            `;

            $.getJSON("https://assets.nishithpisadev.ml/website/data.json", function (json) {
                appendData(json)
            });

            function appendData(data) {
                let timeline = document.getElementById("timeline");
                let slideshow = document.getElementById("slideshow");


                data["Roadmap"].reverse().forEach(entry => {
                    let temp = template;
                    let placeholders = {
                        "{{Direction}}": entry.direction,
                        "{{Flag}}": entry.flag,
                        "{{Time}}": entry.time,
                        "{{Description}}": entry.description
                    }

                    for (let placeholder of Object.keys(placeholders))
                        temp = temp.replace(placeholder, placeholders[placeholder])

                    timeline.innerHTML += temp;

                })

                data["Certificates"].forEach(entry => {
                    let temp = code.replace("{{image_url}}", entry)
                    slideshow.innerHTML += temp;
                })
                showSlides(1)
            }
        </script>

        <div id="certificates">

            <br>
            <div class="slideshow-container" id="slideshow">

                <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                <a class="next" onclick="plusSlides(1)">&#10095;</a>
            </div>
            <br>
        </div>
        <script>
            var slideIndex = 1;
            showSlides(slideIndex);

            function plusSlides(n) {
                showSlides(slideIndex += n);
            }

            function currentSlide(n) {
                showSlides(slideIndex = n);
            }

            function showSlides(n) {
                var i;
                var slides = document.getElementsByClassName("mySlides");
                var dots = document.getElementsByClassName("dot");
                if (n > slides.length) {
                    slideIndex = 1
                }
                if (n < 1) {
                    slideIndex = slides.length
                }
                for (i = 0; i < slides.length; i++) {
                    slides[i].style.display = "none";
                }
                for (i = 0; i < dots.length; i++) {
                    dots[i].className = dots[i].className.replace(" active", "");
                }
                slides[slideIndex - 1].style.display = "block";
                dots[slideIndex - 1].className += " active";
            }
        </script>

            <script>
                $("#contact-us").submit(function (e) {
                    e.preventDefault();
                    let form = document.getElementById("contact-us");
                    let formData = new FormData(form);
                    let payload = {};

                    for (let key of formData.keys())
                        payload[key] = formData.get(key);

                    /* fetch(form.action, {
                            mode: 'no-cors',

                        .then(() => {

                    $.ajax({
